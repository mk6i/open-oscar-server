<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICQ Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section id="login-panel" class="login-screen" aria-labelledby="login-title">
      <form id="login-form" class="login-card">
        <div class="app-icon" aria-hidden="true">✿</div>
        <p class="eyebrow">Open OSCAR</p>
        <h1 id="login-title">ICQ Web</h1>
        <p class="login-subtitle">Войдите по UIN и паролю, чтобы перейти к общению.</p>

        <label>
          UIN
          <input id="screen-name" name="screen-name" autocomplete="username" inputmode="numeric" required placeholder="123456">
        </label>
        <label>
          Пароль
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
        </label>
        <input id="api-key" name="api-key" type="hidden">
        <button id="login-button" type="submit">Войти</button>
        <p id="connection-status" class="login-status" role="status">Ожидание входа</p>
      </form>
    </section>

    <section id="client-panel" class="client-layout" hidden>
      <aside class="panel contacts-panel" aria-labelledby="contacts-title">
        <div class="panel-header compact">
          <div>
            <p class="eyebrow">ICQ Web</p>
            <h2 id="contacts-title">Контакты</h2>
            <p id="session-summary">Не подключено</p>
          </div>
          <button id="logout-button" class="logout-button inline-flex items-center justify-center uppercase tracking-widest transition-colors" type="button">ВЫХОД</button>
        </div>

        <div class="contact-toolbar">
          <button id="refresh-contacts" class="icon-button" type="button" title="Обновить контакты" aria-label="Обновить контакты">↻</button>
          <select id="presence-state" class="tailwind-select rounded-2xl border border-gray-700 bg-gray-900 text-gray-100 shadow-sm" aria-label="Мой статус">
            <option value="online">В сети</option>
            <option value="freechat">Свободен для разговора</option>
            <option value="away">Отошёл</option>
            <option value="na">Недоступен</option>
            <option value="occupied">Занят</option>
            <option value="dnd">Не беспокоить</option>
            <option value="invisible">Невидимый</option>
          </select>
        </div>

        <form id="add-contact-form" class="add-contact-form">
          <input id="contact-name" type="text" autocomplete="off" inputmode="numeric" placeholder="UIN контакта" aria-label="UIN контакта">
          <button type="submit">+</button>
        </form>

        <input id="contact-filter" class="contact-filter" type="search" autocomplete="off" placeholder="Поиск" aria-label="Поиск контактов">
        <ol id="contact-list" class="contact-list" aria-live="polite"></ol>
      </aside>

      <section class="panel chat-panel" aria-labelledby="chat-title">
        <div class="chat-header">
          <div>
            <h2 id="chat-title">Выберите контакт</h2>
            <p id="chat-subtitle">История сообщений появится здесь.</p>
          </div>
          <button id="clear-history" class="ghost" type="button" disabled>Очистить</button>
        </div>

        <ol id="messages" class="messages min-h-0 flex-1 overflow-auto p-5" aria-live="polite"></ol>

        <form id="message-form" class="composer">
          <textarea id="message-text" rows="2" placeholder="Сообщение (Ctrl+Enter — отправить)" disabled required></textarea>
          <button id="emoji-button" class="emoji-toggle" type="button" title="Смайлы" aria-label="Смайлы">☺</button>
          <button id="send-button" type="submit" disabled>➤</button>
          <div id="emoji-picker" class="emoji-picker" hidden></div>
        </form>
      </section>

      <aside class="panel side-panel" aria-label="Дополнительная панель">
        <section class="self-card">
          <button id="avatar-button" class="avatar-large" type="button" title="Загрузить аватар" aria-label="Загрузить аватар">✿</button>
          <input id="avatar-input" type="file" accept="image/png,image/jpeg" hidden>
          <h2 id="self-name">ICQ</h2>
          <p>JPG/PNG до 256×256</p>
        </section>
        <section class="contact-actions" aria-labelledby="contact-actions-title">
          <h3 id="contact-actions-title">Контакт</h3>
          <p id="contact-actions-name">Выберите контакт</p>
          <button id="rename-contact" type="button" disabled>Переименовать</button>
          <button id="delete-contact" type="button" disabled>Удалить</button>
          <button id="block-contact" type="button" disabled>Заблокировать</button>
        </section>
      </aside>
    </section>

    <div id="toast" class="toast" role="alert" hidden></div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
